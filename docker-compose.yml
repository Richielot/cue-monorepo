services:
  # PostgreSQL database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cue_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js development server
  web:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source for hot reload
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./packages/ui/src:/app/packages/ui/src
      - ./packages/db/src:/app/packages/db/src
      - ./packages/config:/app/packages/config
      # Configs that may change
      - ./apps/web/tailwind.config.ts:/app/apps/web/tailwind.config.ts
      - ./apps/web/next.config.mjs:/app/apps/web/next.config.mjs
      - ./biome.json:/app/biome.json
      - ./turbo.json:/app/turbo.json
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cue_dev
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
